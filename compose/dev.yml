# Local development overrides shared across scenarios.
# Prefer ./scripts/dev-compose.sh so DVRTC_VERSION defaults from VERSION and
# VCS_REF defaults from git. Direct use of these files without DVRTC_VERSION set
# still falls back to dev metadata.
# Usage:
#   ./scripts/dev-compose.sh --scenario pbx1 build
#   ./scripts/dev-compose.sh --scenario pbx2 up -d

services:
  testing:
    build:
      context: build/testing
      args:
        DVRTC_VERSION: ${DVRTC_VERSION:-dev}
        DVRTC_SERVICE: testing
        VCS_REF: ${VCS_REF:-unknown}
        DVRTC_SOURCE: ${DVRTC_SOURCE:-https://github.com/EnableSecurity/DVRTC}

  attacker:
    build:
      context: build/testing
      args:
        DVRTC_VERSION: ${DVRTC_VERSION:-dev}
        DVRTC_SERVICE: testing
        VCS_REF: ${VCS_REF:-unknown}
        DVRTC_SOURCE: ${DVRTC_SOURCE:-https://github.com/EnableSecurity/DVRTC}

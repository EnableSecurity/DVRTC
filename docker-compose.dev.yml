# Local development overrides for maintainers who need to rebuild images.
# Prefer ./scripts/dev-compose.sh so DVRTC_VERSION defaults from VERSION and
# VCS_REF defaults from git. Direct use of this file without DVRTC_VERSION set
# still falls back to dev metadata.
# Usage:
#   ./scripts/dev-compose.sh build
#   ./scripts/dev-compose.sh up -d

services:
  asterisk:
    build:
      context: build/asterisk
      args:
        DVRTC_VERSION: ${DVRTC_VERSION:-dev}
        DVRTC_SERVICE: asterisk
        VCS_REF: ${VCS_REF:-unknown}
        DVRTC_SOURCE: ${DVRTC_SOURCE:-https://github.com/EnableSecurity/DVRTC}

  rtpengine:
    build:
      context: build/rtpengine
      args:
        DVRTC_VERSION: ${DVRTC_VERSION:-dev}
        DVRTC_SERVICE: rtpengine
        VCS_REF: ${VCS_REF:-unknown}
        DVRTC_SOURCE: ${DVRTC_SOURCE:-https://github.com/EnableSecurity/DVRTC}
        RTPENGINE_VERSION: mr10.5.5.1

  kamailio:

####### Global Parameters #########

debug_mode = no
log_level = 1
stderror_enabled = yes
syslog_facility = LOG_LOCAL0

udp_workers = 4

# Module path
mpath = "/usr/lib/x86_64-linux-gnu/opensips/modules/"

####### Modules Section ########

loadmodule "signaling.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "sipmsgops.so"

# Protocol modules
loadmodule "proto_udp.so"
loadmodule "proto_tcp.so"
loadmodule "proto_tls.so"

# NAT traversal
loadmodule "nathelper.so"

# Registration and location
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "auth.so"

# RTPProxy integration
loadmodule "rtpproxy.so"

# String operations
loadmodule "textops.so"

# TLS
loadmodule "tls_mgm.so"
loadmodule "tls_openssl.so"

####### Module Parameters #########

# RTPProxy socket
modparam("rtpproxy", "rtpproxy_sock", "udp:127.0.0.1:7722")

# NAT helper
modparam("registrar|nathelper", "received_avp", "$avp(received)")

# User location
modparam("usrloc", "nat_bflag", "NAT")

# TM params
modparam("tm", "fr_timeout", 30)
modparam("tm", "fr_inv_timeout", 120)

# TLS parameters are configured per TLS domain in tls_mgm.
modparam("tls_mgm", "server_domain", "default")
modparam("tls_mgm", "tls_method", "[default]TLSv1_2-")
modparam("tls_mgm", "verify_cert", "[default]0")
modparam("tls_mgm", "require_cert", "[default]0")
modparam("tls_mgm", "certificate", "[default]/etc/certstore/fullchain.pem")
modparam("tls_mgm", "private_key", "[default]/etc/certstore/privkey.pem")
modparam("auth", "username_spec", "$var(auth_username)")
modparam("auth", "password_spec", "$var(auth_password)")
modparam("auth", "calculate_ha1", 1)

####### Routing Logic ########

route {
    # Per request initial checks
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        exit;
    }

    # NAT detection
    force_rport();
    if (nat_uac_test("private-contact,diff-ip-src-via,diff-port-src-via")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            fix_nated_contact();
        }
        setflag("NAT");
    }

    # OPTIONS keepalive
    if (is_method("OPTIONS")) {
        sl_send_reply(200, "Keepalive");
        exit;
    }

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            t_relay();
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_check_trans()) {
            t_relay();
            exit;
        }
    }

    # In-dialog requests
    if (has_totag()) {
        if (loose_route()) {
            if (is_method("ACK") && has_body("application/sdp")) {
                rtpproxy_answer("ro");
            }
            t_relay();
            exit;
        }
        if (is_method("ACK")) {
            if (t_check_trans()) {
                t_relay();
                exit;
            }
            exit;
        }
        sl_send_reply(404, "Not here");
        exit;
    }

    # Record-route
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle registrations
    if (is_method("REGISTER")) {
        xlog("L_INFO", "REGISTER from $fU\n");
        # Special extension 2000 - digest leak demo
        # Only accept the helper registration from loopback so extension 2000
        # can only be registered by the local digest-leak baresip helper.
        if ($fU == "2000") {
            if ($si != "127.0.0.1") {
                xlog("L_WARN", "Rejecting extension 2000 REGISTER from $si\n");
                sl_send_reply(403, "Forbidden");
                exit;
            }
            $var(auth_username) = "2000";
            $var(auth_password) = "2000";
            if (!pv_www_authorize("")) {
                xlog("L_INFO", "Challenging extension 2000 REGISTER from $si\n");
                www_challenge("", "auth");
                exit;
            }
            consume_credentials();
            xlog("L_INFO", "Extension 2000 REGISTER - saving locally\n");
            if (!save("location")) {
                xlog("L_ERR", "Failed to save location for 2000\n");
                sl_reply_error();
                exit;
            }
            exit;
        }
        # Forward other registrations to FreeSWITCH for auth
        xlog("L_INFO", "Forwarding REGISTER for $fU to FreeSWITCH\n");
        $du = "sip:127.0.0.1:5090;transport=udp";
        if (!t_relay()) {
            xlog("L_ERR", "t_relay failed for REGISTER from $fU\n");
            sl_reply_error();
        }
        exit;
    }

    # Special handling for extension 2000 (digest leak demo)
    # This demonstrates how SIP proxies can leak authentication credentials
    # The attack flow:
    # 1. baresip registers as 2000 (with auth)
    # 2. Attacker calls 2000
    # 3. baresip answers and sends BYE
    # 4. Attacker challenges BYE with 407 Proxy-Auth-Required
    # 5. OpenSIPS relays 407 to baresip
    # 6. baresip responds with credentials
    # 7. OpenSIPS relays credentials to attacker = LEAK!
    if (is_method("INVITE") && $rU == "2000") {
        # Save original R-URI before lookup rewrites it
        $var(orig_ru) = $ru;
        if (!lookup("location")) {
            sl_send_reply(404, "Not Found");
            exit;
        }
        # lookup() rewrote $ru to the contact - save it as destination
        $du = $ru;
        # Restore original R-URI so baresip can match it to its account
        $ru = $var(orig_ru);
        t_relay();
        exit;
    }

    # Route all other requests to FreeSWITCH at 127.0.0.1:5090
    $du = "sip:127.0.0.1:5090;transport=udp";

    # RTP proxy for NAT
    if (has_body("application/sdp")) {
        rtpproxy_offer("ro");
    }

    t_on_reply("1");

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route[1] {
    if (has_body("application/sdp")) {
        rtpproxy_answer("ro");
    }
}

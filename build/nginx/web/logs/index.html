<!DOCTYPE html>
<html>
<head>
    <title>SIP User-Agent Logs - DVRTC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        @import url('../call/css/pressstart.css');
        body {
            background: #00000c;
            color: #B0FDFF;
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            text-transform: uppercase;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h3 {
            font-size: 14px;
            text-shadow: 0 0 26px #7ebdbe;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .back {
            font-size: 9px;
            margin-bottom: 30px;
        }
        .back a {
            color: #5d9293;
            text-decoration: none;
        }
        .back a:hover {
            color: #B0FDFF;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 9px;
            line-height: 1.6;
        }
        th, td {
            border: 1pt solid #5d9293;
            padding: 8px 10px;
            text-align: left;
        }
        th {
            color: #B0FDFF;
            text-shadow: 0 0 14px #5d9293;
            background: rgba(93, 146, 147, 0.15);
        }
        td {
            color: #5d9293;
            text-transform: none;
        }
        tr:hover td {
            color: #B0FDFF;
            background: rgba(93, 146, 147, 0.08);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="back"><a href="/">&lt; back</a></div>
        <h3>User-agents in SIP requests</h3>
        <div id='showTable'></div>
    </div>
</body>

<script>
    var oXHR = new XMLHttpRequest();
    oXHR.onreadystatechange = reportStatus;
    oXHR.open("GET", "useragents/useragents.json", true);
    oXHR.send();

    function reportStatus() {
        if (oXHR.readyState == 4) {
            createTableFromJSON(this.responseText);
        }
    }

    function createTableFromJSON(jsonData) {
        var arrBirds = [];
        arrBirds = JSON.parse(jsonData);

        var col = [];
        for (var i = 0; i < arrBirds.length; i++) {
            for (var key in arrBirds[i]) {
                if (col.indexOf(key) === -1) {
                    col.push(key);
                }
            }
        }

        var table = document.createElement("table");
        var tr = table.insertRow(-1);

        for (var i = 0; i < col.length; i++) {
            var th = document.createElement("th");
            th.innerHTML = col[i];
            tr.appendChild(th);
        }

        for (var i = 0; i < arrBirds.length; i++) {
            tr = table.insertRow(-1);
            for (var j = 0; j < col.length; j++) {
                var tabCell = tr.insertCell(-1);
                // INTENTIONALLY VULNERABLE: XSS via innerHTML
                // User-Agent data rendered without sanitization
                // Attacker can inject JavaScript via SIP User-Agent header
                tabCell.innerHTML = arrBirds[i][col[j]];
            }
        }

        var divContainer = document.getElementById("showTable");
        divContainer.innerHTML = "";
        divContainer.appendChild(table);
    };
</script>
</html>

#!KAMAILIO

#!define ASTERISK "127.0.0.1"
#!define ASTERISK_PORT "5090"

#!define WITH_TLS

#!define MY_WS_PORT 8000
#!define MY_WSS_PORT 8443

# Extension Validation Configuration
# ALLOWED_EXTENSIONS: Regex defining valid SIP extensions/usernames
# - sipcaller1: Internal call generator account (authenticated via generated password)
# - 2000: Special extension for digest leak vulnerability (SPECIAL_EXTENSION)
# - 1000, 1100, 1200, 1300: Active SIP endpoints
# - Extensions not matching this pattern receive 404 (enables enumeration vulnerability)
# - See route[KNOWNRURI] for implementation of enumeration vulnerability
#!define ALLOWED_EXTENSIONS "^(sipcaller1|2000|1000|1100|1200|1300)$"

#!define SPECIAL_EXTENSION 2000
#!define SPECIAL_EXTENSION_PASSWORD "2000"

#!define CALLGEN_EXTENSION 1300

####### Defined Values #########

#!define FLT_NATS 5

#!define FLB_NATB 6

####### Global Parameters #########

### LOG Levels: 3=DBG, 2=INFO, 1=NOTICE, 0=WARN, -1=ERR
debug=1
log_stderror=yes

memdbg=5
memlog=5

log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

children=8

/* prevent auto-generation of bare IP aliases which cause
   loose_route() to misidentify 127.0.0.1:5082 (baresip-digestleak)
   as "myself", breaking in-dialog ACK/BYE routing for ext 2000 */
auto_aliases=no

/* listen directives with advertised addresses */
listen=udp:0.0.0.0:5060 advertise __PUBLIC_IPV4__:5060
listen=tcp:127.0.0.1:5060
listen=tcp:__PUBLIC_IPV4__:5060 advertise __PUBLIC_IPV4__:5060
listen=tcp:0.0.0.0:8000 advertise __PUBLIC_IPV4__:8000
listen=tls:0.0.0.0:5061 advertise __PUBLIC_IPV4__:5061
listen=tls:0.0.0.0:8443 advertise __PUBLIC_IPV4__:8443
__IPV6_LISTENERS__

/* add local domain aliases */
alias="kamailio:5060"
alias="kamailio:5061"
alias="kamailio"
alias="127.0.0.1"
alias="127.0.0.1:5060"
alias="127.0.0.1:5061"
alias="__PUBLIC_IPV4__"
alias="__PUBLIC_IPV4__:5060"
alias="__PUBLIC_IPV4__:5061"
alias="__PUBLIC_IPV4__:8000"
alias="__PUBLIC_IPV4__:8443"
__IPV6_ALIASES__
__DOMAIN_ALIASES__

enable_tls=yes
tls_threads_mode=2

tcp_max_connections=2048
tls_max_connections=2048

####### Modules Section ########

loadmodule "tls.so"
loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "xhttp.so"
loadmodule "websocket.so"
loadmodule "nathelper.so"

loadmodule "usrloc.so"
loadmodule "registrar.so"

loadmodule "auth.so"
loadmodule "rtpengine.so"
loadmodule "ipops.so"
loadmodule "dialog.so"
loadmodule "sdpops.so"

loadmodule "db_mysql.so"
loadmodule "sqlops.so"

# ----------------- setting module-specific parameters ---------------


# ----- jsonrpcs params -----
modparam("jsonrpcs", "pretty_format", 1)

# ----- ctl params -----
# Expose BINRPC on TCP so the testing container can query usrloc/dialogs
modparam("ctl", "binrpc", "tcp:127.0.0.1:2046")

# ----- tm params -----
# auto-discard branches from previous serial forking leg
modparam("tm", "failure_reply_mode", 3)
# default retransmission timeout: 30sec
modparam("tm", "fr_timer", 30000)
# default invite retransmission timeout after 1xx: 120sec
modparam("tm", "fr_inv_timer", 120000)

# ----- rr params -----
modparam("rr", "enable_full_lr", 0)
modparam("rr", "append_fromtag", 0)

modparam("nathelper|registrar", "received_avp", "$avp(RECEIVED)")

modparam("tls", "config", "tls.cfg")

modparam("usrloc", "nat_bflag", FLB_NATB)

modparam("rtpengine", "rtpengine_sock", "udp:__RTPENGINE_IP__:2223")

modparam("tm", "auto_inv_100_reason", "I'd far rather be happy than right any day")

modparam("sanity", "autodrop", 0)

modparam("sqlops","sqlcon","lrn=>mysql://kamailio:kamailiorw@127.0.0.1:__MYSQL_PORT__/useragents")
modparam("db_mysql", "ping_interval", 60)
modparam("db_mysql", "auto_reconnect", 1)
modparam("db_mysql", "timeout_interval", 2)

tcp_connection_lifetime=3604
tcp_accept_no_cl=yes
tcp_rd_buf_size=16384

####### Routing Logic ########


/* Main SIP request routing logic
 * - processing of any incoming SIP request starts with this route
 * - note: this is the same as route { ... } */
 
request_route {

    if ((($Rp == MY_WS_PORT || $Rp == MY_WSS_PORT)
        && !(proto == WS || proto == WSS))) {
        xlog("L_WARN", "SIP request received on $Rp\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }

    route(USERAGENTLOG);

    # per request initial checks
    route(REQINIT);

    # only allow certain extensions in
    route(KNOWNRURI);

    if (nat_uac_test(64)) {
        # Do NAT traversal stuff for requests from a WebSocket
        # connection - even if it is not behind a NAT!
        # This won't be needed in the future if Kamailio and the
        # WebSocket client support Outbound and Path.
        force_rport();
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if (!add_contact_alias()) {
                xlog("L_ERR", "Error aliasing contact <$ct>\n");
                sl_send_reply("400", "Bad Request");
                exit;
            }
        }
    }

    route(FORCENAT);

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # handle retransmissions
    if (!is_method("ACK")) {
        if(t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # handle requests within SIP dialogs
    route(WITHINDLG);

    # Skip SETDESTINATION for extension 2000 - it's registered and should be looked up
    if (!($tU == SPECIAL_EXTENSION && is_method("INVITE"))) {
        route(SETDESTINATION);
    }

    
    ### only initial requests (no To tag)

    route(AUTH);

    # record routing for dialog forming requests (in case they are routed)
    # - remove preloaded route headers
    remove_hf("Route");
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }
    # Track dialogs only for extension 2000, where dialog state is needed
    # to route in-dialog requests back to the registered client.
    if (is_method("INVITE") && !has_totag() && $tU == SPECIAL_EXTENSION) {
        dlg_manage();
        $dlg_var(dst) = $du;
        # Store caller's source address so we can route BYE from baresip
        # back to the caller. $sut preserves the source transport and brackets
        # IPv6 literals, which keeps the fallback URI valid for TCP/TLS/WS/WSS.
        $dlg_var(caller_src) = $sut;
    }

    route(REGISTRAR);
    route(RELAY);

    exit;
}

# INTENTIONALLY VULNERABLE: SQL Injection and XSS via User-Agent
# User-Agent header ($ua) is directly inserted into SQL without sanitization (SQL injection)
# User-Agent data is displayed in web interface without sanitization (XSS via innerHTML)
# Example SQL injection: User-Agent: '); DROP TABLE useragents; --
# Example XSS: User-Agent: <img src=x onerror=alert(document.cookie)>
# Web interface: build/nginx/web-pbx1/logs/index.html displays data via innerHTML (line 75)
route[USERAGENTLOG]{
    if ($tU == CALLGEN_EXTENSION) {
        return;
    }
    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        return;
    }
    if ($(ua{s.len}) > 0){
        if (sql_query("lrn", "insert into useragents (useragent) values ('$ua')") != 1) {
            sl_send_reply("500","Ouch");
            exit;
        }
    }
}

# Force NAT stuff
route[FORCENAT] {
	force_rport();
	if (nat_uac_test("19")) {
		if (is_method("REGISTER")) {
			fix_nated_register();
		} else {
			if(is_first_hop()) {
				set_contact_alias();
			}
		}
		setflag(FLT_NATS);
	}
	return;
}


# Wrapper for relaying requests
route[RELAY] {
    # enable additional event routes for forwarded requests
    # - serial forking, RTP relaying handling, a.s.o.
    if (is_method("INVITE|BYE|SUBSCRIBE|UPDATE")) {
        if(!t_is_set("branch_route")) t_on_branch("MANAGE_BRANCH");
    }
    if (is_method("INVITE|SUBSCRIBE|UPDATE")) {
        if(!t_is_set("onreply_route")) t_on_reply("MANAGE_REPLY");
    }
    if (is_method("INVITE")) {
        if(!t_is_set("failure_route")) t_on_failure("MANAGE_FAILURE");
    }

    if (is_method("INVITE") && ($tU == SPECIAL_EXTENSION)) {
        xlog("L_INFO", "we have an INVITE for 2000\n");
        lookup("location");
        switch ($retcode) {
            case -1:
            case -3:
                sl_send_reply("404", "Not Found");
                exit;
            case -2:
                sl_send_reply("405", "Not Found");
                exit;
        };
        # Save destination for in-dialog routing (ACK, BYE)
        # Without this, loose_route() misidentifies the ACK R-URI
        # (127.0.0.1:5082) as "myself" due to auto-aliases, causing
        # the ACK to be misrouted and 200 OK retransmission loops
        $du = $ru;
        $dlg_var(dst) = $du;
        xlog("L_WARN","RELAY to registered client: $ru (du=$du)\n");
    }
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# Per SIP request initial checks
route[REQINIT] {
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    if(is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }

    if(!sanity_check("1511", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }
}

# INTENTIONALLY VULNERABLE: Extension Enumeration via Response Code
# This route enables extension enumeration attacks by returning 404 for unknown extensions
# Valid extensions return different response codes (e.g., 401/407 for auth required, 200 for success)
# Vulnerability allows attackers to discover valid extensions via response code analysis
# See ALLOWED_EXTENSIONS define for the list of valid extensions
route[KNOWNRURI] {
    if (is_method("REGISTER")){
        if !($fU =~ ALLOWED_EXTENSIONS) {
            sl_send_reply("404","enumerate me baby");
            exit;
        }
    }
    if (is_method("SUBSCRIBE|NOTIFY|PUBLISH|MESSAGE|INVITE|OPTIONS")){
        if !($rU =~ ALLOWED_EXTENSIONS) {
            sl_send_reply("404","enumerate me baby");
            exit;
        }
    }
}

# Handle requests within SIP dialogs
route[WITHINDLG] {
    if (!has_totag()) return;

    # sequential request withing a dialog should
    # take the path determined by record-routing
    if (loose_route()) {
        # Only force the stored destination for requests headed toward
        # extension 2000. Requests originating from 2000 already carry
        # the caller contact in the R-URI and must not be sent back to
        # the registered baresip contact.
        if ($dlg_var(dst) != $null && $fU != SPECIAL_EXTENSION) {
            $du = $dlg_var(dst);
        }
        route(DLGURI);
        if ( is_method("ACK") ) {
            # ACK is forwarded statelessly
            route(NATMANAGE);
        } else if ( is_method("NOTIFY") ) {
            # Add Record-Route for in-dialog NOTIFY as per RFC 6665.
            record_route();
        }
        route(RELAY);
        exit;
    }
    # Keep broad dialog tracking disabled, but still relay ordinary
    # in-dialog BYEs that arrive with a route set. Extension 2000 keeps
    # using the stricter dialog-managed path above.
    if (is_method("BYE") && $fU != SPECIAL_EXTENSION && is_present_hf("Route")) {
        route(DLGURI);
        route(RELAY);
        exit;
    }
    if ( is_method("ACK") ) {
        if ( t_check_trans() ) {
            # no loose-route, but stateful ACK;
            # must be an ACK after a 487
            # or e.g. 404 from upstream server
            route(RELAY);
            exit;
        } else {
            # ACK without matching transaction ... ignore and discard
            exit;
        }
    }
    # Handle BYE from extension 2000 when loose_route() fails.
    # Baresip uses strict routing, putting the Record-Route as the R-URI
    # instead of the caller's Contact, so loose_route() can't process it.
    # Route the BYE back to the original caller using the stored source.
    if (is_method("BYE") && $fU == SPECIAL_EXTENSION && $dlg_var(caller_src) != $null) {
        $du = $dlg_var(caller_src);
        route(RELAY);
        exit;
    }
    sl_send_reply("404","Not here");
    exit;
}


route[DLGURI] {
    if(!isdsturiset()) {
        handle_ruri_alias();
    }
    return;
}


# Manage outgoing branches
branch_route[MANAGE_BRANCH] {
    xdbg("new branch [$T_branch_idx] to $ru\n");
    route(NATMANAGE);
}

# Manage incoming replies
onreply_route[MANAGE_REPLY] {
    if(status=~"[12][0-9][0-9]") {
            route(NATMANAGE);
    }

    xdbg("incoming reply\n");
}

route[SETDESTINATION] {
    # update $du to set the destination address for proxying
    if (compare_ips(ASTERISK, $si) && $sp == ASTERISK_PORT) {
        $du = $ru;
    }
    if (!isdsturiset()) {
        $du = "sip:" + ASTERISK + ":" + ASTERISK_PORT + ";transport=tcp";
    }
}

route[NATMANAGE] {
    
    if (is_request()) {
        if(has_totag()) {
            if(check_route_param("nat=yes")) {
                setbflag(FLB_NATB);
            }
        }
    }
    if (has_body("application/sdp")) {
        $var(rtpenginecmd) = "replace-origin replace-session-connection pad-crypto";
        $var(addrfamcmd) = '';
        $var(icecmd) = '';
        $var(rtcpmuxcmd) = '';
        if ($avp(srtpcmd) == $null){
            $avp(srtpcmd) = '';
            if (sdp_with_transport("UDP/TLS/RTP/SAVPF") || sdp_with_transport("RTP/SAVPF")) {
                $avp(srtpcmd) = "RTP/SAVPF";
            } else if (sdp_with_transport("RTP/SAVP")) {
                $avp(srtpcmd) = "RTP/SAVP";
            }
        }
        if ($avp(hasice) == $null){
            $avp(hasice) = -2;
            if (sdp_with_ice()){
                $avp(hasice) = 1;
            }
        }
        if ($avp(rtcpmux) == $null){
            sdp_get_line_startswith("$avp(rtcpmux)", "a=rtcp-mux");
        }
        if (compare_ips(ASTERISK, $si) && $sp == ASTERISK_PORT) {
            if ($avp(hasice) == 1) $var(icecmd) = "ICE=force";
            rtpengine_manage("$var(rtpenginecmd) $avp(srtpcmd) $var(icecmd)");
            xlog("L_DBG", "SDP from $si passed through rtpengine [ $var(rtpenginecmd) $avp(srtpcmd) $var(icecmd) ]\n");
        } else {
            $var(rtpenginecmd) = "RTP/AVP replace-origin replace-session-connection pad-crypto";
            if ($si =~ ":") $var(addrfamcmd) = "address-family=IP4";
            if ($avp(hasice) == 1) $var(icecmd) = "ICE=remove";
            # sdp_get_line_startswith() stores the matching SDP line, so a
            # non-empty value means the offer had rtcp-mux enabled.
            if ($(avp(rtcpmux){s.len}) > 0) $var(rtcpmuxcmd) = "rtcp-mux-demux";
            rtpengine_manage("$var(rtpenginecmd) $var(addrfamcmd) $var(icecmd) $var(rtcpmuxcmd)");
            xlog("L_DBG", "SDP from $si passed through rtpengine [ $var(rtpenginecmd) $var(addrfamcmd) $var(icecmd) $var(rtcpmuxcmd) ](2)\n");
        }
    }

    if (is_request()) {
        if (!has_totag()) {
            if(t_is_branch_route()) {
                add_rr_param(";nat=yes");
            }
        }
    }
    if (is_reply()) {
        if(isbflagset(FLB_NATB)) {
            if(is_first_hop())
                set_contact_alias();
        }
    }
    return;
}

# Manage failure routing cases
failure_route[MANAGE_FAILURE] {
    route(NATMANAGE);
    if (t_is_canceled()) exit;
}



event_route[xhttp:request] {
    set_reply_close();
    set_reply_no_connect();
    
    if ($Rp != MY_WS_PORT
#!ifdef WITH_TLS
        && $Rp != MY_WSS_PORT
#!endif
    ) {
        xlog("L_WARN", "HTTP request received on $Rp\n");
        xhttp_reply("403", "Forbidden", "", "");
        exit;
    }

    xlog("L_DBG", "HTTP Request Received\n");

    if ($hdr(Upgrade)=~"websocket"
            && $hdr(Connection)=~"Upgrade"
            && $rm=~"GET") {

        # Validate Host - make sure the client is using the correct
        # alias for WebSockets
        if ($hdr(Host) == $null || !is_myself("sip:" + $hdr(Host))) {
            xlog("L_WARN", "Bad host $hdr(Host)\n");
            xhttp_reply("403", "Forbidden", "", "");
            exit;
        }

        # Optional... validate Origin - make sure the client is from an
        # authorised website.  For example,
        #
        # if ($hdr(Origin) != "http://communicator.MY_DOMAIN"
        #     && $hdr(Origin) != "https://communicator.MY_DOMAIN") {
        #	xlog("L_WARN", "Unauthorised client $hdr(Origin)\n");
        #	xhttp_reply("403", "Forbidden", "", "");
        #	exit;
        # }

        # Optional... perform HTTP authentication

        # ws_handle_handshake() exits (no further configuration file
        # processing of the request) when complete.
        if (ws_handle_handshake())
        {
            # Optional... cache some information about the
            # successful connection
            exit;
        }
    }

    xhttp_reply("404", "Not Found", "", "");
}

event_route[websocket:closed] {
    xlog("L_INFO", "WebSocket connection from $si:$sp has closed\n");
}

# Handle SIP registrations
route[REGISTRAR] {
    if ($tU != SPECIAL_EXTENSION) return;
    if (!is_method("REGISTER")) return;
    if ($si != "127.0.0.1") {
        xlog("L_WARN", "special extension is trying to register from non-loopback IP!\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }
    xlog("L_INFO", "special extension is trying to register from loopback\n");
    if(isflagset(FLT_NATS)) {
        setbflag(FLB_NATB);
    }
    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}


route[AUTH] {
    # INTENTIONALLY VULNERABLE: SIP Digest Leak for Extension 2000
    # Extension 2000 (SPECIAL_EXTENSION) only authenticates REGISTER requests
    # INVITEs and other methods pass through unchallenged
    # When extension 2000 sends BYE after answering a call, and the attacker challenges
    # that BYE with 407, extension 2000 will re-send the BYE with credentials
    # Kamailio forwards this authenticated BYE to the attacker, leaking the credentials
    # Works with baresip-digestleak container that auto-answers and hangs up
    if ($tU == SPECIAL_EXTENSION) {
        if (!is_method("REGISTER")) return;
        # authenticate requests
        if (!pv_auth_check("$fd", SPECIAL_EXTENSION_PASSWORD, "0", "1")) {
            xlog("L_INFO","authenticating special extension\n");
            auth_challenge("$fd", "1");
            exit;
        }
        # if caller is not local subscriber, then check if it calls
        # a local destination, otherwise deny, not an open relay here
        if (from_uri!=myself && uri!=myself) {
            sl_send_reply("403","Not relaying auth");
            exit;
        }
    }
    return;
}

[server:default]
method = TLSv1.2
verify_certificate = no
require_certificate = no
private_key = /etc/certstore/privkey.pem
certificate = /etc/certstore/fullchain.pem
#ca_list = /opt/kamailio/etc/kamailio/tls/cacert.pem
#crl = /opt/kamailio/etc/kamailio/tls/crl.pem

[client:default]
method = TLSv1.2
verify_certificate = no
require_certificate = no

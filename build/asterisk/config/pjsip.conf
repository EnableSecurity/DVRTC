; PJSIP configuration for DVRTC
; Only extension 1000 and sipcaller1 are configured
; Extensions 1100-1300 and 2000 are handled via Kamailio routing (no PJSIP endpoints)

[transport-tcp]
type = transport
protocol = tcp
bind = 127.0.0.1:5090
; Detect and clean up stale TCP connections from Kamailio
tcp_keepalive_enable = yes
tcp_keepalive_idle_time = 30
tcp_keepalive_interval_time = 5
tcp_keepalive_probe_count = 3

; Extension 1000 - Standard endpoint
; INTENTIONALLY VULNERABLE: Weak password (1500) for cracking demonstrations
[1000]
type = endpoint
context = Dial-Users
auth = 1000
allow = all
aors = 1000

[1000]
type = aor
max_contacts = 1000

[1000]
type = auth
auth_type = userpass
password = 1500
username = 1000

; sipcaller1 - Internal call generator account
; Password substituted from environment variable at runtime (see build/asterisk/run.sh)
[sipcaller1]
type = endpoint
context = Dial-Users
allow = all
aors = sipcaller1
auth = sipcaller1
rtp_timeout = 30
rtp_timeout_hold = 30

[sipcaller1]
type = aor
max_contacts = 1000

[sipcaller1]
type = auth
auth_type = userpass
password = __SIPCALLER1_PASSWORD__
username = sipcaller1

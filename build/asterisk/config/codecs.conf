[plc]
; Packet Loss Concealment for all codecs which do not support native PLC
; This determines whether to perform generic PLC
; There is a minor performance penalty for this.
; By default PLC is applied only when the 2 codecs in a channel are different.
genericplc => true

; Apply generic PLC to channels even if the 2 codecs are the same.
; This forces transcoding via slin so the performance impact should be considered.
; Ignored if genericplc is not also enabled.
genericplc_on_equal_codecs => false

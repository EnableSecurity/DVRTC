[globals]

[Dialing-Errors]
; Catch-all for invalid extensions
exten = _X.,1,Verbose(1, "User ${CALLERID(num)} dialed an invalid number.")
 same = n,Playback(pbx-invalid)
 same = n,Hangup()

[Dial-Users]
; All incoming calls route to this context (set in pjsip.conf endpoint context)
; Extension 1000: Standard endpoint (weak password for cracking demos)
exten = 1000,1,Verbose(1, "User ${CALLERID(num)} calling extension 1000")
 same = n,Dial(PJSIP/1000,10)
 same = n,Hangup()

; Extension 1100: Voicemail (RTP flood target)
exten = 1100,1,Verbose(1, "User ${CALLERID(num)} calling voicemail")
 same = n,Voicemail(1100,u)
 same = n,Hangup()

; Extension 1200: Echo test (RTP injection target)
exten = 1200,1,Verbose(1, "User ${CALLERID(num)} calling echo service at 1200")
 same = n,Answer()
 same = n,Echo()
 same = n,Hangup()

; Extension 1300: Call generator target (RTP bleed demo)
exten = 1300,1,Answer()
 same = n,Set(TIMEOUT(absolute)=25)
 same = n,Echo()
 same = n,Hangup()

